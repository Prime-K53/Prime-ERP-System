[build]
  command = "npm --prefix backend install && cd frontend && npm ci && npm run build"
  publish = "frontend/dist"

[[redirects]]
  from = "/api/*"
  to = "https://prime-erp-system.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
